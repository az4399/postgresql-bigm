name: Build PostgreSQL 18 + pg_bigm

on:
  workflow_dispatch:          # 仅手动触发

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write          # 推送到 GHCR 需要

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64   # 仅 x86_64

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64          # 仅 x86
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/postgres-bigm:18
            ghcr.io/${{ github.repository_owner }}/postgres-bigm:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
