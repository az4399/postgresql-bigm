name: Build and Push pg_bigm Image (x86 Only)

on:
  push:
    branches:
      - main  # 当你把代码推送到 main 分支时自动触发构建
  workflow_dispatch: # 允许你在 GitHub 页面上点击按钮手动触发构建

env:
  REGISTRY: ghcr.io
  # 镜像名字会自动变为：ghcr.io/你的github用户名/postgres-bigm
  IMAGE_NAME: ${{ github.repository_owner }}/postgres-bigm 

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # 必须赋予写入 GHCR 的权限

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 建立 Docker Buildx 核心环境
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 登录到 GitHub 容器注册表 (GHCR)
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 提取元数据（自动打上 latest 标签和 commit 序列号）
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      # 核心步骤：只编译并推送 x86 架构镜像
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64  # 👈 这里已锁死为传统 x86 服务器架构
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha   # 开启 GitHub 缓存，二次构建极速完成
          cache-to: type=gha,mode=max
